services:
  frontend:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      APP_ENV: ${APP_ENV:-local}
      APP_URL: ${APP_URL:-http://localhost:18081}
      API_URL: ${API_URL:-http://localhost:18080/api}
      VITE_API_URL: ${API_URL:-http://localhost:18080/api}
    ports:
      - "18081:5173"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:5173').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - actnow

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      APP_ENV: ${APP_ENV:-local}
      APP_URL: ${APP_URL:-http://localhost:18081}
      API_URL: ${API_URL:-http://localhost:18080/api}
      DATABASE_URL: ${DATABASE_URL:-postgresql://actnow:actnow@postgres:5432/actnow?schema=public}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minioadmin}
      S3_BUCKET_UPLOADS: ${S3_BUCKET_UPLOADS:-actnow-uploads}
      S3_BUCKET_GENERATED: ${S3_BUCKET_GENERATED:-actnow-generated}
      S3_BUCKET_EXPORTS: ${S3_BUCKET_EXPORTS:-actnow-exports}
      TEXT_MODEL_PROXY_BASE_URL: ${TEXT_MODEL_PROXY_BASE_URL:-http://120.24.30.8:8098}
      TEXT_MODEL_PROXY_API_PATH: ${TEXT_MODEL_PROXY_API_PATH:-/api/proxy}
      TEXT_MODEL_PROXY_MODE: ${TEXT_MODEL_PROXY_MODE:-actnow-proxy}
      TEXT_MODEL_PROXY_API_KEY: ${TEXT_MODEL_PROXY_API_KEY:-}
      TEXT_MODEL_PROXY_MAX_TOKENS: ${TEXT_MODEL_PROXY_MAX_TOKENS:-4096}
      DEFAULT_TEXT_MODEL: ${DEFAULT_TEXT_MODEL:-deepseek-v4-flash}
      TEXT_MODEL_DIRECTOR_MODEL: ${TEXT_MODEL_DIRECTOR_MODEL:-deepseek-v4-pro}
      TEXT_MODEL_WORKER_MODEL: ${TEXT_MODEL_WORKER_MODEL:-deepseek-v4-flash}
      GENERATION_DEFAULT_BACKEND_MODE: ${GENERATION_DEFAULT_BACKEND_MODE:-human_loop}
      DEMO_SINGLE_USER: ${DEMO_SINGLE_USER:-true}
      DEMO_USER_ID: ${DEMO_USER_ID:-demo-user}
      JWT_SECRET: ${JWT_SECRET:-local-dev-change-me}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      BULLMQ_PREFIX: ${BULLMQ_PREFIX:-actnow-local}
    ports:
      - "18080:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - actnow

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      APP_ENV: ${APP_ENV:-local}
      APP_URL: ${APP_URL:-http://localhost:18081}
      API_URL: ${API_URL:-http://localhost:18080/api}
      DATABASE_URL: ${DATABASE_URL:-postgresql://actnow:actnow@postgres:5432/actnow?schema=public}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minioadmin}
      S3_BUCKET_UPLOADS: ${S3_BUCKET_UPLOADS:-actnow-uploads}
      S3_BUCKET_GENERATED: ${S3_BUCKET_GENERATED:-actnow-generated}
      S3_BUCKET_EXPORTS: ${S3_BUCKET_EXPORTS:-actnow-exports}
      TEXT_MODEL_PROXY_BASE_URL: ${TEXT_MODEL_PROXY_BASE_URL:-http://120.24.30.8:8098}
      TEXT_MODEL_PROXY_API_PATH: ${TEXT_MODEL_PROXY_API_PATH:-/api/proxy}
      TEXT_MODEL_PROXY_MODE: ${TEXT_MODEL_PROXY_MODE:-actnow-proxy}
      TEXT_MODEL_PROXY_API_KEY: ${TEXT_MODEL_PROXY_API_KEY:-}
      TEXT_MODEL_PROXY_MAX_TOKENS: ${TEXT_MODEL_PROXY_MAX_TOKENS:-4096}
      DEFAULT_TEXT_MODEL: ${DEFAULT_TEXT_MODEL:-deepseek-v4-flash}
      TEXT_MODEL_DIRECTOR_MODEL: ${TEXT_MODEL_DIRECTOR_MODEL:-deepseek-v4-pro}
      TEXT_MODEL_WORKER_MODEL: ${TEXT_MODEL_WORKER_MODEL:-deepseek-v4-flash}
      GENERATION_DEFAULT_BACKEND_MODE: ${GENERATION_DEFAULT_BACKEND_MODE:-human_loop}
      DEMO_SINGLE_USER: ${DEMO_SINGLE_USER:-true}
      DEMO_USER_ID: ${DEMO_USER_ID:-demo-user}
      JWT_SECRET: ${JWT_SECRET:-local-dev-change-me}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      BULLMQ_PREFIX: ${BULLMQ_PREFIX:-actnow-local}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - actnow

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: actnow
      POSTGRES_USER: actnow
      POSTGRES_PASSWORD: actnow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U actnow -d actnow"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - actnow

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - actnow

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - actnow

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    environment:
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minioadmin}
      S3_BUCKET_UPLOADS: ${S3_BUCKET_UPLOADS:-actnow-uploads}
      S3_BUCKET_GENERATED: ${S3_BUCKET_GENERATED:-actnow-generated}
      S3_BUCKET_EXPORTS: ${S3_BUCKET_EXPORTS:-actnow-exports}
    volumes:
      - ./docker/minio/create-buckets.sh:/create-buckets.sh:ro
    entrypoint: ["/bin/sh", "/create-buckets.sh"]
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - actnow

networks:
  actnow:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  minio-data:
